services:

  telemt:
    image: whn0thacked/telemt-docker:latest
    container_name: telemt
    restart: unless-stopped
    environment:
      RUST_LOG: "info"
    volumes:
      - ./telemt/telemt.toml:/etc/telemt.toml
    ports:
      - "10443:443/tcp"
      - "${TELEMT_EXTERNAL_PORT:-9091}:9091"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M

  dante:
    build: dante/
    image: banfen321/dante-proxy:latest
    restart: unless-stopped
    network_mode: host
    environment:
      SOCKD_PORT:           ${SOCKD_PORT:-1080}
      SOCKD_BIND_ADDR:      ${SOCKD_BIND_ADDR:-0.0.0.0}
      SOCKD_ALLOW_IPS:      ${SOCKD_ALLOW_IPS:-0.0.0.0/0}
      SOCKD_USER_NAME:      ${SOCKD_USER_NAME:-proxy}
      SOCKD_USER_PASSWORD:  ${SOCKD_USER_PASSWORD:-}
      SOCKD_EXTERNAL_IFACE: ${SOCKD_EXTERNAL_IFACE:-}
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
    security_opt:
      - no-new-privileges:true

  stunnel:
    build: dante/stunnel/
    restart: unless-stopped
    network_mode: host
    volumes:
      - stunnel-certs:/etc/stunnel/certs
    ports:
      - "${DANTE_EXTERNAL_PORT:-1080}:${STUNNEL_PORT:-1080}/tcp"
    environment:
      STUNNEL_PORT: ${STUNNEL_PORT:-1080}
      SOCKD_PORT:   ${SOCKD_PORT:-1081}