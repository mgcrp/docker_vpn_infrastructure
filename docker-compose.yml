services:

  telemt:
    image: whn0thacked/telemt-docker:latest
    container_name: telemt
    restart: unless-stopped
    environment:
      RUST_LOG: "info"
    volumes:
      - ./telemt/telemt.toml:/etc/telemt.toml
    ports:
      - "${TELEMT_EXTERNAL_PORT:-10443}:443/tcp"
      - "9091:9091"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    tmpfs:
      - /etc/telemt:rw,nosuid,nodev,noexec,size=16m
      - /tmp:rw,nosuid,nodev,noexec,size=16m
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M

  dante:
    build: dante/
    image: banfen321/dante-proxy:latest
    restart: unless-stopped
    network_mode: host
    environment:
      SOCKD_PORT:           ${SOCKD_PORT:-1080}
      SOCKD_BIND_ADDR:      ${SOCKD_BIND_ADDR:-0.0.0.0}
      SOCKD_ALLOW_IPS:      ${SOCKD_ALLOW_IPS:-0.0.0.0/0}
      SOCKD_USER_NAME:      ${SOCKD_USER_NAME:-proxy}
      SOCKD_USER_PASSWORD:  ${SOCKD_USER_PASSWORD:-}
      SOCKD_EXTERNAL_IFACE: ${SOCKD_EXTERNAL_IFACE:-}
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
    security_opt:
      - no-new-privileges:true

  naive:
    build: naive/
    image: vpn-infra/naive-proxy:latest
    container_name: naive
    restart: unless-stopped
    environment:
      NAIVE_DOMAIN:         ${NAIVE_DOMAIN:?}
      NAIVE_EMAIL:          ${NAIVE_EMAIL:?}
      NAIVE_USER_NAME:      ${NAIVE_USER_NAME:-naive}
      NAIVE_USER_PASSWORD:  ${NAIVE_USER_PASSWORD:-}
      NAIVE_MASK_SITE:      ${NAIVE_MASK_SITE:-yastatic.net}
      NAIVE_HTTP_PORT:      ${NAIVE_HTTP_PORT:-80}
      NAIVE_HTTPS_PORT:     ${NAIVE_HTTPS_PORT:-443}
    ports:
      - "${NAIVE_HTTP_PORT:-80}:${NAIVE_HTTP_PORT:-80}/tcp"
      - "${NAIVE_HTTPS_PORT:-443}:${NAIVE_HTTPS_PORT:-443}/tcp"
    volumes:
      - naive-data:/data
      - naive-config:/config
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M

volumes:
  stunnel-certs:
  naive-data:
  naive-config: