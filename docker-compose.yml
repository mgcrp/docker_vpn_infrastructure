services:

  telemt:
    image: whn0thacked/telemt-docker:latest
    container_name: telemt
    restart: unless-stopped
    environment:
      RUST_LOG: "info"
    volumes:
      - ./telemt/telemt.toml:/etc/telemt.toml
    ports:
      - "${TELEMT_EXTERNAL_PORT:-10443}:443/tcp"
      - "9091:9091"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    tmpfs:
      - /etc/telemt:rw,nosuid,nodev,noexec,size=16m
      - /tmp:rw,nosuid,nodev,noexec,size=16m
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M

  dante:
    build: dante/
    container_name: dante
    image: banfen321/dante-proxy:latest
    restart: unless-stopped
    network_mode: host
    environment:
      SOCKD_PORT:           ${SOCKD_PORT:-1080}
      SOCKD_BIND_ADDR:      ${SOCKD_BIND_ADDR:-0.0.0.0}
      SOCKD_ALLOW_IPS:      ${SOCKD_ALLOW_IPS:-0.0.0.0/0}
      SOCKD_USER_NAME:      ${SOCKD_USER_NAME:-proxy}
      SOCKD_USER_PASSWORD:  ${SOCKD_USER_PASSWORD:-}
      SOCKD_EXTERNAL_IFACE: ${SOCKD_EXTERNAL_IFACE:-}
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
    security_opt:
      - no-new-privileges:true

  naive:
    build: naive/
    container_name: naive
    restart: unless-stopped
    environment:
      NAIVE_DOMAIN:         ${NAIVE_DOMAIN:?}
      NAIVE_EMAIL:          ${NAIVE_EMAIL:?}
      NAIVE_USER_NAME:      ${NAIVE_USER_NAME:-naive}
      NAIVE_USER_PASSWORD:  ${NAIVE_USER_PASSWORD:-}
      NAIVE_MASK_SITE:      ${NAIVE_MASK_SITE:-yastatic.net}
      NAIVE_HTTP_PORT:      ${NAIVE_HTTP_PORT:-80}
      NAIVE_HTTPS_PORT:     ${NAIVE_HTTPS_PORT:-443}
    ports:
      - "${NAIVE_HTTP_PORT:-80}:${NAIVE_HTTP_PORT:-80}/tcp"
      - "${NAIVE_HTTPS_PORT:-443}:${NAIVE_HTTPS_PORT:-443}/tcp"
    volumes:
      - naive-data:/data
      - naive-config:/config
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M

  trojan:
    build: trojan/
    container_name: trojan
    restart: unless-stopped
    depends_on:
      - naive
    environment:
      TROJAN_PORT:          ${TROJAN_PORT:-40443}
      TROJAN_DOMAIN:        ${NAIVE_DOMAIN:?}
      TROJAN_USER_NAME:     ${TROJAN_USER_NAME:-trojan}
      TROJAN_USER_PASSWORD: ${TROJAN_USER_PASSWORD:-}
    ports:
      - "${TROJAN_PORT:-40443}:${TROJAN_PORT:-40443}/tcp"
    volumes:
      - naive-data:/naive-data:ro
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M

  mieru:
    build: mieru/
    container_name: mieru
    restart: unless-stopped
    ports:
      - "${MIERU_PORT:-30443}:${MIERU_PORT:-30443}/tcp"
    volumes:
      - ./mieru/mieru-users.json:/config/mieru-users.json:ro
      - mieru-etc:/etc/mita
      - mieru-data:/var/lib/mita
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: unless-stopped
    network_mode: host
    command:
      - "--path.rootfs=/host"
      - "--web.listen-address=:${NODE_EXPORTER_PORT:-9100}"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    volumes:
      - /:/host:ro,rslave
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "0.20"
          memory: 128M

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    restart: unless-stopped
    ports:
      - "${CADVISOR_PORT:-8081}:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "0.30"
          memory: 256M

volumes:
  stunnel-certs:
  naive-data:
  naive-config:
  mieru-etc:
  mieru-data: